name: Build Windows EXE

# Builds a ready-to-run Prowl.exe on a Windows runner and uploads it as an
# artifact. Download it from the run's "Artifacts" section — no Python needed.

on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - ".github/workflows/build-windows.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Build Prowl.exe (portable)
        working-directory: windows
        run: pyinstaller --onefile --windowed --name Prowl --icon Prowl.ico prowl_window.py

      - name: Upload portable Prowl.exe
        uses: actions/upload-artifact@v4
        with:
          name: Prowl-Windows-Portable
          path: windows/dist/Prowl.exe
          if-no-files-found: error

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer (Prowl-Setup.exe)
        working-directory: windows
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Prowl-Windows-Installer
          path: windows/installer_out/Prowl-Setup.exe
          if-no-files-found: error
